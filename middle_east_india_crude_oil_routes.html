<h2 class="sr-only">Map of Middle East to India crude oil shipping routes, showing checkpoints at export terminals, chokepoints, and Indian import ports connected by red route lines</h2>
<div id="map" style="width:100%;"></div>
<div style="display:flex;flex-wrap:wrap;gap:16px;margin-top:8px;font-size:12px;color:var(--text-secondary);">
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:2px;background:#c0392b;display:inline-block;"></span>Tanker route</span>
  <span style="display:flex;align-items:center;gap:4px;"><span style="width:9px;height:9px;border-radius:50%;background:#c0392b;display:inline-block;"></span>Checkpoint</span>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const landFill = isDark ? '#2c2c2a' : '#e1e0d9';
const seaFill = isDark ? '#1a1a19' : '#fcfcfb';
const borderStroke = isDark ? '#444441' : '#b4b2a9';
const textColor = isDark ? '#c2c0b6' : '#3d3d3a';

const pts = {
  basra: [48.810, 29.781, 'Basra oil terminal'],
  rasTanura: [50.158, 26.643, 'Ras Tanura'],
  minaAlAhmadi: [48.167, 28.875, 'Mina Al Ahmadi'],
  fujairah: [56.336, 25.112, 'Fujairah'],
  hormuz: [56.250, 26.566, 'Strait of Hormuz'],
  gulfOman: [58.500, 24.500, 'Gulf of Oman'],
  arabSea1: [65.000, 18.000, 'Arabian Sea lane'],
  babElMandeb: [43.333, 12.583, 'Bab el-Mandeb'],
  yanbu: [38.061, 24.089, 'Yanbu'],
  gulfAden: [48.000, 12.000, 'Gulf of Aden'],
  arabSea2: [60.000, 16.000, 'Arabian Sea lane'],
  vadinar: [69.830, 22.467, 'Vadinar Port'],
  kochi: [76.267, 9.966, 'Kochi Port']
};

const routes = [
  ['basra','hormuz','gulfOman','arabSea1','vadinar'],
  ['rasTanura','hormuz','gulfOman','arabSea1','vadinar'],
  ['minaAlAhmadi','hormuz','gulfOman','arabSea1','vadinar'],
  ['fujairah','arabSea1','vadinar'],
  ['yanbu','babElMandeb','gulfAden','arabSea2','kochi']
];

const pointFC = {
  type: 'FeatureCollection',
  features: Object.values(pts).map(p => ({type:'Feature', geometry:{type:'Point', coordinates:[p[0], p[1]]}}))
};

const width = 900, height = 620;
const svg = d3.select('#map').append('svg')
  .attr('viewBox', `0 0 ${width} ${height}`).attr('width','100%').style('background', seaFill);

const projection = d3.geoMercator().fitExtent([[30,30],[width-30,height-30]], pointFC);
const path = d3.geoPath(projection);
const line = d3.line().x(d => projection(pts[d])[0]).y(d => projection(pts[d])[1]).curve(d3.curveLinear);

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
  svg.append('g').selectAll('path')
    .data(topojson.feature(world, world.objects.countries).features)
    .join('path').attr('d', path).attr('fill', landFill).attr('stroke', borderStroke).attr('stroke-width', 0.5);

  routes.forEach(r => {
    svg.append('path').attr('d', line(r)).attr('fill', 'none').attr('stroke', '#c0392b').attr('stroke-width', 2).attr('stroke-linejoin','round').attr('opacity', 0.85);
  });

  const g = svg.append('g');
  Object.entries(pts).forEach(([key, p]) => {
    const [x, y] = projection([p[0], p[1]]);
    g.append('circle').attr('cx', x).attr('cy', y).attr('r', 4.5).attr('fill', '#c0392b').attr('stroke', seaFill).attr('stroke-width', 1);
    g.append('text').attr('x', x + 7).attr('y', y - 5).attr('font-size', 11).attr('fill', textColor).text(p[2]);
  });
});
</script>
